<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nohope Coffee - Đăng nhập</title>
    <meta name="description" content="Đăng nhập vào hệ thống quản lý Nohope Coffee.">
    <!-- Open Graph tags to satisfy SEO check -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://coffee-house.com/login.html">
    <meta property="og:title" content="Nohope Coffee - Đăng nhập">
    <meta property="og:description" content="Đăng nhập vào hệ thống quản lý Nohope Coffee.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/login.css">

    <link rel="stylesheet" href="/css/logo.css">
    <!-- PWA Favicons -->
    <link rel="icon" type="image/png" href="/images/bunny_logo.png">
    <link rel="apple-touch-icon" href="/images/bunny_logo.png">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <a href="/" class="brand-logo login-brand-logo">
                <img src="/images/bunny_logo.png" alt="Bunny Logo" class="login-brand-image">
                <span class="login-brand-text">Nohope</span>
            </a>
            <p class="subtitle">Đăng nhập vào hệ thống quản lý</p>

            <div class="login-tabs">
                <button type="button" class="login-tab active" id="tab-account"><i class="fa-solid fa-user-lock me-2"></i>Tài khoản</button>
                <button type="button" class="login-tab" id="tab-pin"><i class="fa-solid fa-key me-2"></i>Mã PIN</button>
            </div>

            <form id="login-form">
                <!-- Account Section -->
                <div id="account-section">
                    <div class="form-group">
                        <label>Tên đăng nhập</label>
                        <div class="input-icon-wrapper">
                            <input type="text" id="username" placeholder="Nhập Tài Khoản..." autocomplete="username">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="input-icon-wrapper">
                            <input type="password" id="password" placeholder="Nhập mật khẩu..." autocomplete="current-password">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>
                </div>

                <!-- PIN Section -->
                <div id="pin-section" class="hidden">
                    <div class="form-group">
                        <label class="login-pin-label">Mã PIN Bí mật</label>
                        <div class="input-icon-wrapper">
                            <input type="password" id="staff-pin" placeholder="••••••" inputmode="numeric" autocomplete="off" class="login-pin-input">
                            <i class="fa-solid fa-key login-pin-icon"></i>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="login-btn">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập
                </button>
                
                <div class="error-msg" id="error-msg">
                    <i class="fa-solid fa-circle-exclamation me-1"></i> <span id="error-text">Tài khoản hoặc mật khẩu không đúng!</span>
                </div>
            </form>

            <p class="footer-text">
                Powered by <a href="/">Nohope Coffee System</a>
            </p>
        </div>
    </div>

    <!-- Supabase Core & Auth logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script>
        let currentMode = 'account';

        // Tab Switching
        document.getElementById('tab-account').addEventListener('click', () => {
            currentMode = 'account';
            document.getElementById('tab-account').classList.add('active');
            document.getElementById('tab-pin').classList.remove('active');
            document.getElementById('account-section').classList.remove('hidden');
            document.getElementById('pin-section').classList.add('hidden');
            document.getElementById('error-msg').style.display = 'none';
        });

        document.getElementById('tab-pin').addEventListener('click', () => {
            currentMode = 'pin';
            document.getElementById('tab-pin').classList.add('active');
            document.getElementById('tab-account').classList.remove('active');
            document.getElementById('pin-section').classList.remove('hidden');
            document.getElementById('account-section').classList.add('hidden');
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('staff-pin').focus();
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Đang xác thực...';
            errorMsg.style.display = 'none';

            try {
                if (currentMode === 'account') {
                    const user = document.getElementById('username')?.value?.trim() || '';
                    const pass = document.getElementById('password')?.value?.trim() || '';
                    if (!user || !pass) throw new Error("Vui lòng nhập đủ Tên đăng nhập và Mật khẩu.");

                    const { data, error } = await supabase
                        .rpc('verify_credentials', { p_username: user, p_password: pass })
                        .single();

                    if (error) {
                        if (error.code === 'PGRST116') throw new Error("Tài khoản hoặc mật khẩu không đúng!");
                        else throw new Error("Lỗi hệ thống: " + error.message);
                    }
                    if (!data) throw new Error("Tài khoản hoặc mật khẩu không đúng!");

                    let authEmail = '';
                    let authPass = '';
                    if (data.role === 'kitchen') {
                        authEmail = 'kitchen@nohope.cafe';
                        authPass = 'SharedKitchenPwd#123';
                    } else if (data.role === 'staff') {
                        authEmail = 'staff@nohope.cafe';
                        authPass = 'SharedStaffPwd#123';
                    } else if (data.role === 'admin' || data.role === 'manager') {
                        authEmail = 'admin@nohope.cafe';
                        authPass = 'AdminPassword!2024';
                    } else {
                        throw new Error('Vai trò không hợp lệ');
                    }

                    const authRes = await supabase.auth.signInWithPassword({
                        email: authEmail,
                        password: authPass
                    });

                    if (authRes.error) throw new Error("Lỗi xác thực hệ thống: " + authRes.error.message);

                    sessionStorage.setItem('cafe_role', data.role);
                    sessionStorage.setItem('nohope_staff_auth', 'true');
                    sessionStorage.setItem('nohope_staff_name', data.name || user);
                    sessionStorage.setItem('nohope_permissions', JSON.stringify(data.permissions || []));
                    sessionStorage.setItem('nohope_staff_avatar', data.avatar_url || '');
                    
                    localStorage.removeItem('cafe_token');
                    localStorage.removeItem('cafe_role');
                    localStorage.removeItem('nohope_staff_auth');
                    localStorage.removeItem('nohope_staff_name');
                    
                    let role = data.role;

                    btn.innerHTML = '<i class="fa-solid fa-check me-2"></i>Thành công!';
                    btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

                    setTimeout(() => {
                        if (role === 'admin' || role === 'manager') window.location.href = '/admin';
                        else if (role === 'kitchen') window.location.href = '/kitchen';
                        else window.location.href = '/staff';
                    }, 500);
                } else {
                    // PIN Mode via Supabase RPC mapped to Auth
                    const pin = document.getElementById('staff-pin')?.value || '';
                    if (!pin) throw new Error("Vui lòng nhập Mã PIN.");

                    const { data, error } = await supabase
                        .rpc('verify_pin', { pin_code: pin })
                        .single();

                    if (error || !data) throw new Error("Mã PIN không hợp lệ (sai mã)!");

                    // Map role to silent Supabase Auth login
                    let authEmail = '';
                    let authPass = '';
                    if (data.role === 'kitchen') {
                        authEmail = 'kitchen@nohope.cafe';
                        authPass = 'SharedKitchenPwd#123';
                    } else if (data.role === 'staff') {
                        authEmail = 'staff@nohope.cafe';
                        authPass = 'SharedStaffPwd#123';
                    } else if (data.role === 'admin' || data.role === 'manager') {
                        authEmail = 'admin@nohope.cafe';
                        authPass = 'AdminPassword!2024';
                    } else {
                        throw new Error('Vai trò không hợp lệ');
                    }

                    const authRes = await supabase.auth.signInWithPassword({
                        email: authEmail,
                        password: authPass
                    });

                    if (authRes.error) throw new Error("Lỗi xác thực hệ thống: " + authRes.error.message);

                    sessionStorage.setItem('cafe_role', data.role);
                    sessionStorage.setItem('nohope_staff_auth', 'true');
                    sessionStorage.setItem('nohope_staff_name', data.name || 'Nhân viên');
                    sessionStorage.setItem('nohope_permissions', JSON.stringify(data.permissions || []));
                    sessionStorage.setItem('nohope_staff_avatar', data.avatar_url || '');
                    
                    localStorage.removeItem('cafe_role');
                    localStorage.removeItem('nohope_staff_auth');
                    localStorage.removeItem('nohope_staff_name');

                    btn.innerHTML = '<i class="fa-solid fa-check me-2"></i>Thành công!';
                    btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

                    setTimeout(() => {
                        if (data.role === 'admin' || data.role === 'manager') window.location.href = '/admin';
                        else if (data.role === 'kitchen') window.location.href = '/kitchen';
                        else window.location.href = '/staff';
                    }, 500);
                }
            } catch (err) {
                errorText.innerText = err.message || "Lỗi kết nối đến máy chủ.";
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập';
                    btn.style.background = '';
                }, 1500);
            }
        });
    </script>

    <!-- Floating sparkles -->
    <script>
        for (let i = 0; i < 12; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = (6 + Math.random() * 8) + 's';
            s.style.animationDelay = Math.random() * 8 + 's';
            s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
            document.body.appendChild(s);
        }
    </script>
</body>

</html>
