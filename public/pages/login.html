<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nohope Coffee - Đăng nhập</title>
    <meta name="description" content="Đăng nhập vào hệ thống quản lý Nohope Coffee.">
    <!-- Open Graph tags to satisfy SEO check -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://coffee-house.com/login.html">
    <meta property="og:title" content="Nohope Coffee - Đăng nhập">
    <meta property="og:description" content="Đăng nhập vào hệ thống quản lý Nohope Coffee.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/login.css">
    <script src="/js/i18n-pages.js"></script>

    <link rel="stylesheet" href="/css/logo.css">
    <!-- PWA Favicons -->
    <link rel="icon" type="image/png" href="/images/bunny_logo.png">
    <link rel="apple-touch-icon" href="/images/bunny_logo.png">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <a href="/" class="brand-logo login-brand-logo">
                <img src="/images/bunny_logo.png" alt="Bunny Logo" class="login-brand-image">
                <span class="login-brand-text">Nohope</span>
            </a>
            <p class="subtitle">Đăng nhập vào hệ thống quản lý</p>

            <form id="login-form">
                <!-- Branch Selector -->
                <div id="tenant-section" class="form-group">
                    <label class="login-pin-label">Chi nhánh</label>
                    <div class="input-icon-wrapper">
                        <select id="tenant-select" class="login-select-input">
                            <option value="">Đang tải chi nhánh...</option>
                        </select>
                        <i class="fa-solid fa-store login-pin-icon"></i>
                    </div>
                </div>

                <!-- PIN Section -->
                <div id="pin-section">
                    <div class="form-group">
                        <label class="login-pin-label">Mã PIN Bí mật</label>
                        <div class="input-icon-wrapper">
                            <input type="password" id="staff-pin" placeholder="••••••" inputmode="numeric" autocomplete="off" class="login-pin-input" autofocus>
                            <i class="fa-solid fa-key login-pin-icon"></i>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="login-btn">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập
                </button>
                
                <div class="error-msg" id="error-msg">
                    <i class="fa-solid fa-circle-exclamation me-1"></i> <span id="error-text">Mã PIN không hợp lệ!</span>
                </div>
            </form>

            <p class="footer-text">
                Powered by <a href="/">Nohope Coffee System</a>
            </p>
        </div>
    </div>

    <!-- Supabase Core & Auth logic -->
    <script src="/js/supabase.js"></script>
    <script src="/js/supabase-config.js"></script>
    <script>
        let currentMode = 'pin';

        // Load active tenants for branch selector
        async function loadTenants() {
            const select = document.getElementById('tenant-select');
            const section = document.getElementById('tenant-section');
            try {
                const { data, error } = await supabase.rpc('list_active_tenants');
                if (error || !data || data.length === 0) {
                    select.innerHTML = '<option value="">Không có chi nhánh</option>';
                    select.disabled = true;
                    return;
                }

                select.innerHTML = '';
                if (data.length > 1) {
                    const defaultOpt = document.createElement('option');
                    defaultOpt.value = '';
                    defaultOpt.textContent = '-- Chọn chi nhánh --';
                    select.appendChild(defaultOpt);
                }

                data.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.textContent = t.name;
                    select.appendChild(opt);
                });

                // Auto-select if only 1 tenant (show name, disable select)
                if (data.length === 1) {
                    select.value = data[0].id;
                    select.disabled = true;
                }

                // Pre-select from URL param ?store=xxx
                const urlStore = new URLSearchParams(window.location.search).get('store');
                if (urlStore) {
                    const match = data.find(t => t.id === urlStore || t.name.toLowerCase() === urlStore.toLowerCase());
                    if (match) {
                        select.value = match.id;
                        select.disabled = true;
                    }
                }
            } catch (e) {
                select.innerHTML = '<option value="">Lỗi tải chi nhánh</option>';
                select.disabled = true;
            }
        }

        loadTenants();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Đang xác thực...';
            errorMsg.style.display = 'none';

            try {
                const typedPin = document.getElementById('staff-pin')?.value || '';
                if (!typedPin) throw new Error("Vui lòng nhập Mã PIN.");

                const tenantSelect = document.getElementById('tenant-select');
                const selectedTenant = tenantSelect.value || null;

                // Build RPC params — include tenant_id if selected
                const rpcParams = { pin_code: typedPin };
                if (selectedTenant) {
                    rpcParams.p_tenant_id = selectedTenant;
                }

                const { data, error } = await supabase
                    .rpc('verify_pin', rpcParams)
                    .single();

                if (error || !data) throw new Error("Mã PIN không hợp lệ hoặc sai chi nhánh!");

                // Phase 6 SaaS: Dynamic Individual Auth using UUID and typed PIN
                const authEmail = 'staff_' + data.id + '@nohope.cafe';
                const authPass = typedPin;
                
                const authRes = await supabase.auth.signInWithPassword({
                    email: authEmail,
                    password: authPass
                });

                if (authRes.error) throw new Error("Lỗi xác thực hệ thống SaaS: " + authRes.error.message);

                sessionStorage.setItem('cafe_role', data.role);
                sessionStorage.setItem('nohope_staff_auth', 'true');
                sessionStorage.setItem('nohope_staff_name', data.name || 'Nhân viên');
                sessionStorage.setItem('nohope_permissions', JSON.stringify(data.permissions || []));
                sessionStorage.setItem('nohope_staff_avatar', data.avatar_url || '');
                if (data.tenant_id) {
                    sessionStorage.setItem('tenant_id', data.tenant_id);
                    localStorage.setItem('tenant_id', data.tenant_id);
                }
                if (data.tenant_name) {
                    sessionStorage.setItem('tenant_name', data.tenant_name);
                }
                if (data.subscription_end_date) {
                    sessionStorage.setItem('subscription_end_date', data.subscription_end_date);
                }
                if (data.max_staff !== undefined) {
                    sessionStorage.setItem('max_staff', data.max_staff);
                }
                if (data.max_items !== undefined) {
                    sessionStorage.setItem('max_items', data.max_items);
                }
                
                // Sync essential auth info to localStorage for cross-tab access (kitchen, tv)
                localStorage.setItem('cafe_role', data.role);
                localStorage.setItem('nohope_staff_auth', 'true');
                localStorage.setItem('nohope_staff_name', data.name || 'Nhân viên');

                btn.innerHTML = '<i class="fa-solid fa-check me-2"></i>Thành công!';
                btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

                setTimeout(() => {
                    if (data.role === 'admin' || data.role === 'manager') window.location.href = '/admin';
                    else if (data.role === 'kitchen') window.location.href = '/kitchen';
                    else window.location.href = '/staff';
                }, 500);
            } catch (err) {
                errorText.innerText = err.message || "Lỗi kết nối đến máy chủ.";
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập';
                    btn.style.background = '';
                }, 1500);
            }
        });
    </script>

    <!-- Floating sparkles -->
    <script>
        for (let i = 0; i < 12; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = (6 + Math.random() * 8) + 's';
            s.style.animationDelay = Math.random() * 8 + 's';
            s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
            document.body.appendChild(s);
        }
    </script>
</body>

</html>
