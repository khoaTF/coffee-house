<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nohope Coffee - Màn hình Bếp</title>
    <meta name="description" content="Màn hình quản lý bếp của Nohope Coffee.">
    <!-- SEO Meta Tags -->
    <meta property="og:title" content="Nohope Coffee - Màn hình Bếp">
    <meta property="og:description" content="Quản lý thực trạng bếp của Nohope Coffee.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cafe-house.example.com/kitchen.html">
    <meta property="og:image" content="https://cafe-house.example.com/images/bunny_logo.png">
    <meta name="robots" content="noindex, nofollow">
    <!-- Velvet Crema Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    
    <!-- Core Styles -->
    <link rel="stylesheet" href="/css/styles.css?v=1.9">
    
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="/css/index.css">
    
    <!-- Bootstrap CSS (Kept purely for the historical modal) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        /* Fix modal backdrop to cover tailwind headers */
        .modal-backdrop { z-index: 1040 !important; }
        .modal { z-index: 1050 !important; }

        /* Item-Level Tracking */
        .kitchen-item { transition: all 0.2s ease; border-radius: 8px; padding: 8px !important; margin: 2px 0; }
        .kitchen-item[onclick]:hover { background: rgba(217, 117, 49, 0.08); }
        .kitchen-item.item-done { background: rgba(34, 197, 94, 0.06); }
        .item-check { font-size: 1.2rem; flex-shrink: 0; transition: all 0.2s ease; color: #9ca3af; }
        .item-check.checked { color: #22c55e; transform: scale(1.1); }
        .item-code-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 28px; height: 22px; padding: 0 6px;
            background: #FFF4E8; color: #994700; font-weight: 700; font-size: 0.7rem;
            border-radius: 6px; border: 1px solid #FFDDBB; flex-shrink: 0;
        }
        .dark .item-code-badge { background: rgba(255, 122, 0, 0.15); color: #FF7A00; border-color: rgba(255, 122, 0, 0.3); }
        .item-progress-bar { margin-top: 4px; }
    </style>

    <script>
        // Auth gate: hide page until verified
        document.documentElement.style.opacity = '0';
    </script>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.3/dist/umd/supabase.min.js"></script>
    <script src="/js/supabase-config.js"></script>
    <script>
        // Combined Auth Check: Supabase session + role validation
        (async function() {
            const role = localStorage.getItem('cafe_role') || sessionStorage.getItem('cafe_role');
            if (role !== 'kitchen' && role !== 'admin' && role !== 'manager') {
                window.location.href = '/login';
                return;
            }
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    localStorage.clear(); sessionStorage.clear();
                    window.location.href = '/login';
                    return;
                }
            } catch(e) {
                console.error('Auth check failed:', e);
                window.location.href = '/login';
                return;
            }
            // Auth verified — reveal page
            document.documentElement.style.opacity = '1';
            document.documentElement.style.transition = 'opacity 0.3s ease';
        })();
    </script>
    
    <!-- PWA Favicons -->
    <link rel="icon" type="image/png" href="/images/bunny_logo.png">
    <link rel="apple-touch-icon" href="/images/bunny_logo.png">
    <script src="/js/i18n-pages.js"></script>
</head>
<body class="bg-[#F6F3F2] dark:bg-[#1B1C1C] text-[#1B1C1C] dark:text-[#F6F3F2] min-h-[100dvh]">

    <!-- Header -->
    <header class="bg-white dark:bg-[#2A2B2B] shadow-sm sticky top-0 z-40 border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-[#994700] to-[#FF7A00] rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-fire-burner text-xl"></i>
                </div>
                <div>
                    <h1 class="font-headline font-extrabold text-xl md:text-2xl text-[#1B1C1C] dark:text-white mb-0">Nohope Kitchen</h1>
                    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-0 block">Quản lý trạm bếp</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 overflow-x-auto pb-2 md:pb-0 w-full md:w-auto">
                <div class="hidden sm:flex items-center gap-2 mr-2 border-r border-gray-200 dark:border-gray-700 pr-4">
                    <div id="kitchen-staff-avatar" class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center border border-gray-200 dark:border-gray-700 overflow-hidden flex-shrink-0">
                        <i class="fa-solid fa-user text-gray-500 dark:text-gray-400 text-sm"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] text-gray-400 dark:text-gray-500 uppercase font-bold leading-none mb-1">Đang đăng nhập</span>
                        <span id="kitchen-staff-name" class="text-sm font-bold text-[#1B1C1C] dark:text-white leading-tight">Nhân viên</span>
                    </div>
                </div>
                <div id="connection-status" class="px-3 py-1.5 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 font-semibold text-xs rounded-lg whitespace-nowrap border border-green-200 dark:border-green-800">
                    <i class="fa-solid fa-wifi mr-1"></i> Online
                </div>
                <button id="btn-toggle-audio" class="px-4 py-2 bg-[#F6F3F2] dark:bg-[#1B1C1C] hover:bg-[#994700] hover:text-white dark:hover:bg-[#994700] text-[#994700] rounded-lg transition-colors font-semibold text-sm whitespace-nowrap border border-gray-200 dark:border-gray-700 shadow-sm" onclick="toggleAudio()">
                    <i class="fa-solid fa-volume-high mr-1"></i> Âm báo
                </button>
                <button class="px-4 py-2 bg-[#F6F3F2] dark:bg-[#1B1C1C] hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors font-semibold text-sm whitespace-nowrap border border-gray-200 dark:border-gray-700 shadow-sm" onclick="openKitchenHistory()">
                    <i class="fa-solid fa-clock-rotate-left mr-1"></i> Lịch sử
                </button>
                <a href="/admin" class="px-4 py-2 bg-[#F6F3F2] dark:bg-[#1B1C1C] hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors font-semibold text-sm whitespace-nowrap border border-gray-200 dark:border-gray-700 shadow-sm flex items-center" id="btn-admin-link" onclick="const r = localStorage.getItem('cafe_role') || sessionStorage.getItem('cafe_role'); if (r !== 'admin' && r !== 'manager') { event.preventDefault(); alert('Chỉ có Quản lý mới được vào trang Quản trị!'); }">
                    <i class="fa-solid fa-gear mr-1"></i> Quản trị
                </a>
                <button class="px-4 py-2 bg-red-50 dark:bg-red-900/20 text-red-600 hover:bg-red-100 dark:hover:bg-red-900/40 rounded-lg transition-colors font-semibold text-sm whitespace-nowrap border border-red-100 dark:border-red-800 shadow-sm" onclick="(async()=>{ try { await supabase.from('audit_logs').insert([{ tenant_id: sessionStorage.getItem('tenant_id') || localStorage.getItem('tenant_id'), admin_identifier: (sessionStorage.getItem('nohope_staff_name')||'Bếp') + ' (' + (sessionStorage.getItem('cafe_role')||'kitchen') + ')', action: 'Đăng xuất', details: 'Đăng xuất khỏi trang Bếp lúc ' + new Date().toLocaleString('vi-VN') }]); } catch(e){} supabase.auth.signOut().then(()=>{ localStorage.clear(); sessionStorage.clear(); window.location.href='/login'; }); })()">
                    <i class="fa-solid fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 md:p-6 max-w-screen-2xl mx-auto">
        <div id="alerts-container" class="mb-4"></div>
        <div id="loader" class="text-center py-8 text-gray-500 dark:text-gray-400 hidden">
            <i class="fa-solid fa-circle-notch fa-spin text-2xl text-[#994700] mb-3"></i>
            <p class="font-medium">Đang đồng bộ lệnh bếp...</p>
        </div>

        <!-- Kitchen Toolbar -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 bg-white dark:bg-[#2A2B2B] p-4 rounded-[1.25rem] border border-gray-200 dark:border-gray-800 shadow-sm">
            <h2 class="font-headline font-bold text-xl flex items-center gap-2 m-0 text-[#1B1C1C] dark:text-[#F6F3F2]">
                <i class="fa-solid fa-bell-concierge text-[#D97531]"></i> Phiếu order đang chờ
            </h2>
            <div class="flex flex-wrap items-center gap-4 md:gap-6">
                <select id="kdsStationSelect" onchange="changeKdsStation()" class="bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-[#1B1C1C] dark:text-[#F6F3F2] rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-[#D97531]">
                    <option value="all">Tất cả Trạm</option>
                    <option value="drinks">Pha Chế (Nước)</option>
                    <option value="food">Bếp (Đồ ăn)</option>
                </select>
                <label class="flex items-center gap-2 cursor-pointer font-medium text-sm text-gray-700 dark:text-gray-300 hover:text-[#994700] transition-colors select-none">
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="autoPrintToggle" onchange="toggleAutoPrint()" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-300 checked:right-0 checked:border-[#994700] checked:bg-[#994700] transition-all" style="top: 2px; left: 2px; width: 1.25rem; height: 1.25rem;"/>
                        <label for="autoPrintToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 dark:bg-gray-600 cursor-pointer"></label>
                    </div>
                    <i class="fa-solid fa-print"></i> Tự in bill mới
                </label>
                
                <label class="flex items-center gap-2 cursor-pointer font-medium text-sm text-gray-700 dark:text-gray-300 hover:text-[#994700] transition-colors select-none">
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="groupOrdersToggle" onchange="toggleOrderGrouping()" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-300 checked:right-0 checked:border-[#D97531] checked:bg-[#D97531] transition-all" style="top: 2px; left: 2px; width: 1.25rem; height: 1.25rem;"/>
                        <label for="groupOrdersToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 dark:bg-gray-600 cursor-pointer"></label>
                    </div>
                    <i class="fa-solid fa-layer-group"></i> Gộp Món
                </label>
            </div>
            
            <style>
                .toggle-checkbox:checked { right: 0; border-color: #994700; }
                .toggle-checkbox:checked + .toggle-label { background-color: #fca5a5; } /* fallback */
                input#groupOrdersToggle:checked { border-color: #D97531; background-color: #D97531; }
                input#autoPrintToggle:checked { border-color: #994700; background-color: #994700; }
                input:checked + .toggle-label { background-color: rgba(217, 117, 49, 0.2); }
            </style>
        </div>

        <div class="flex flex-col xl:flex-row gap-6 items-start">
            <!-- Orders Grid -->
            <div id="orders-container" class="flex-1 w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-5">
                <!-- Javascript will inject order cards here -->
            </div>
            
            <!-- Sidebar Batch Tracker -->
            <div id="batch-container" class="w-full xl:w-[350px] bg-white dark:bg-[#2A2B2B] rounded-[1.5rem] p-5 shadow-sm border border-gray-200 dark:border-gray-800 xl:sticky xl:top-24 flex-shrink-0">
                <h6 class="text-[#D97531] font-bold text-lg mb-4 pb-4 border-b border-gray-100 dark:border-gray-700 flex items-center gap-2 font-headline">
                    <i class="fa-solid fa-layer-group"></i> Tổng hợp chế biến
                </h6>
                <div id="batch-list" class="flex flex-col gap-3 custom-scrollbar overflow-y-auto" style="max-height: calc(100vh - 200px);">
                    <!-- Batch items will go here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Kitchen History Modal -->
    <div class="modal fade" id="kitchenHistoryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
            <div class="modal-content bg-white dark:bg-[#1B1C1C] border-0 rounded-2xl shadow-2xl">
                <div class="modal-header border-b border-gray-200 dark:border-gray-800 px-6 py-4">
                    <h5 class="modal-title font-bold font-headline text-lg dark:text-white mb-0"><i class="fa-solid fa-clock-rotate-left mr-2 text-[#D97531]"></i> Lịch sử đơn hàng (Bếp)</h5>
                    <button type="button" class="btn-close dark:filter dark:invert" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0 custom-scrollbar" style="max-height: 50vh; overflow-y: auto;">
                    <div id="kitchen-history-loader" class="text-center py-10" style="display: none;">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-[#994700]"></i>
                        <div class="mt-3 text-gray-500 font-medium">Đang tải lịch sử...</div>
                    </div>
                    <div id="kitchen-history-error" class="text-center py-10 text-red-500" style="display: none;">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-3"></i>
                        <div class="font-medium">Không thể tải lịch sử đơn hàng.</div>
                    </div>
                    <div class="list-group list-group-flush" id="kitchen-history-list">
                        <!-- History items injected here -->
                    </div>
                </div>
                <div class="modal-footer border-t border-gray-200 dark:border-gray-800 p-4">
                    <button type="button" class="px-5 py-2.5 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-800 dark:text-white rounded-xl transition-colors font-medium border-0" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Estimated Time Modal (replaces window.prompt which is blocked on many browsers) -->
    <div id="estimated-time-modal" class="fixed inset-0 bg-black/50 z-[9999] items-center justify-center p-4 backdrop-blur-sm" style="display:none;">
        <div class="bg-white dark:bg-[#2A2B2B] w-full max-w-sm rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="p-5 border-b border-gray-100 dark:border-gray-800 bg-gradient-to-r from-[#994700]/10 to-[#D97531]/10">
                <h5 class="font-headline font-bold text-lg text-[#1B1C1C] dark:text-white flex items-center gap-2 mb-1">
                    <i class="fa-solid fa-fire text-[#D97531]"></i> Nhận đơn & Chế biến
                </h5>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-0">Nhập thời gian chuẩn bị dự kiến</p>
            </div>
            <div class="p-5">
                <div class="flex items-center gap-3 mb-4">
                    <input type="number" id="estimated-time-input" value="15" min="1" max="120"
                        class="flex-1 text-center text-2xl font-bold bg-gray-100 dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-[#D97531] text-[#1B1C1C] dark:text-white"
                        inputmode="numeric">
                    <span class="text-gray-500 dark:text-gray-400 font-semibold text-lg">phút</span>
                </div>
                <div class="flex gap-2 mb-2">
                    <button onclick="document.getElementById('estimated-time-input').value=5" class="flex-1 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-[#D97531]/10 rounded-lg text-sm font-semibold text-gray-700 dark:text-gray-300 transition-colors border border-gray-200 dark:border-gray-700">5 phút</button>
                    <button onclick="document.getElementById('estimated-time-input').value=10" class="flex-1 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-[#D97531]/10 rounded-lg text-sm font-semibold text-gray-700 dark:text-gray-300 transition-colors border border-gray-200 dark:border-gray-700">10 phút</button>
                    <button onclick="document.getElementById('estimated-time-input').value=15" class="flex-1 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-[#D97531]/10 rounded-lg text-sm font-semibold text-gray-700 dark:text-gray-300 transition-colors border border-gray-200 dark:border-gray-700">15 phút</button>
                    <button onclick="document.getElementById('estimated-time-input').value=20" class="flex-1 py-2 bg-gray-100 dark:bg-gray-800 hover:bg-[#D97531]/10 rounded-lg text-sm font-semibold text-gray-700 dark:text-gray-300 transition-colors border border-gray-200 dark:border-gray-700">20 phút</button>
                </div>
            </div>
            <div class="p-4 border-t border-gray-100 dark:border-gray-800 flex gap-3">
                <button id="estimated-time-cancel" class="flex-1 py-3 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-xl font-semibold text-gray-700 dark:text-gray-300 transition-colors">Hủy</button>
                <button id="estimated-time-confirm" class="flex-1 py-3 bg-[#D97531] hover:bg-[#b05f28] text-white rounded-xl font-bold transition-all shadow-sm hover:shadow active:scale-95 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-fire"></i> Bắt đầu
                </button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (For Modal) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const staffName = sessionStorage.getItem('nohope_staff_name') || localStorage.getItem('nohope_staff_name') || 'Bếp';
            const nameEl = document.getElementById('kitchen-staff-name');
            if (nameEl) nameEl.textContent = staffName;

            const avatarUrl = sessionStorage.getItem('nohope_staff_avatar') || '';
            const avatarEl = document.getElementById('kitchen-staff-avatar');
            if (avatarUrl && avatarEl) {
                avatarEl.innerHTML = `<img src="${avatarUrl}" alt="Customer avatar" class="w-full h-full object-cover" onerror="this.onerror=null;this.parentElement.innerHTML='<i class=\'fa-solid fa-user text-gray-500 dark:text-gray-400 text-sm\'></i>';">`;
            }
        });
    </script>
    <script src="/js/constants.js"></script>
    <script src="/js/helpers.js"></script>
    <script src="/js/kitchen.js?v=2.1"></script>
    <script src="/js/receipt-printer.js"></script>
</body>
</html>
