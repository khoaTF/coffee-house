<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Đăng nhập dành cho nhân viên Nohope Coffee.">
    <meta property="og:title" content="Nhân Viên Đăng Nhập - Nohope Coffee">
    <meta property="og:description" content="Truy cập hệ thống quản lý nội bộ của Nohope Coffee.">
    <meta property="og:type" content="website">
    <title>Nhân Viên - Nohope Coffee</title>
    <!-- FontAwesome for standard UI icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Liquid Glass CSS -->
    <link rel="stylesheet" href="styles.css?v=2.0">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            background: radial-gradient(circle at top right, #FFFFFF 0%, #F8FAFC 100%);
        }
        .login-card { 
            background: var(--surface-glass);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 40px; 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-xl); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            border: 1px solid var(--surface-glass-border);
            animation: slideUpFade 0.6s ease-out;
        }
        .login-card h2 { 
            margin-bottom: 24px; 
            color: var(--primary); 
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }
        .input-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .input-group input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--border); 
            border-radius: var(--radius-sm);
            transition: all 300ms ease;
            font-size: 1rem;
            background: var(--surface-glass);
            color: var(--text-main);
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(92, 64, 51, 0.15);
        }
        .error-msg { 
            color: var(--danger); 
            margin-top: 16px; 
            display: none; 
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
    <!-- PWA Favicons -->
    <link rel="icon" type="image/png" href="/images/bunny_logo.png">
    <link rel="apple-touch-icon" href="/images/bunny_logo.png">
</head>
<body>

    <div class="login-card">
        

    <!-- Supabase Core & Auth logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        document.getElementById('login-btn').addEventListener('click', attemptLogin);
        document.getElementById('staff-pin').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') attemptLogin();
        });

        async function attemptLogin() {
            const pin = document.getElementById('staff-pin').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');
            
            if (!pin) {
                errorMsg.textContent = "Vui lòng nhập mã PIN.";
                errorMsg.style.display = 'block';
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang tải...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // For staff login, we authenticate against the specific 'users' table using role 'staff'
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('pin', pin)
                    .eq('role', 'staff')
                    .single();

                if (error || !data) {
                    throw new Error("Sai mã PIN");
                }

                // Setup session storage auth
                sessionStorage.setItem('nohope_staff_auth', 'true');
                sessionStorage.setItem('nohope_staff_name', data.name || 'Nhân viên');
                
                // Clear old localStorage if present to force clean session
                localStorage.removeItem('nohope_staff_auth');
                localStorage.removeItem('nohope_staff_name');
                
                // Redirect to Staff Dashboard
                window.location.href = 'staff.html';

            } catch (err) {
                errorMsg.textContent = "Mã PIN không hợp lệ hoặc bạn không có quyền.";
                errorMsg.style.display = 'block';
                btn.innerHTML = 'Đăng Nhập';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
