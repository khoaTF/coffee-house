<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Màn hình hiển thị trạng thái đơn hàng (TV Queue) cho quán Nohope Coffee.">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="TV Queue - Nohope Coffee">
    <meta property="og:description" content="Màn hình hiển thị trạng thái đơn hàng (TV Queue) cho quán Nohope Coffee.">
    
    <title>TV Queue - Nohope Coffee</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js?v=1.1"></script>
    
    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --gold: #d4a76a;
            --danger: #ff4d4d;
            --success: #2ecc71;
        }
        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; /* Hide scrollbars for TV */
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .tv-header {
            background: rgba(22, 27, 34, 0.95);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(212, 167, 106, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .tv-header h1 {
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 3rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .clock {
            font-size: 2rem;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            font-family: monospace;
        }

        /* Main Grid */
        .tv-grid {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        .tv-column {
            flex: 1;
            background: var(--surface-color);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        .column-header {
            padding: 20px;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.2);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .preparing-col .column-header { color: #f1c40f; border-bottom-color: rgba(241, 196, 15, 0.3); }
        .ready-col .column-header { color: #2ecc71; border-bottom-color: rgba(46, 204, 113, 0.3); background: rgba(46, 204, 113, 0.1); }

        .orders-list {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-content: flex-start;
            overflow-y: auto;
            flex: 1;
        }

        /* Queue Item Card */
        .queue-item {
            width: calc(50% - 10px);
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
        }

        .preparing-col .queue-item {
            border-left: 8px solid #f1c40f;
        }

        .ready-col .queue-item {
            border-left: 8px solid #2ecc71;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.1), rgba(0,0,0,0.2));
            animation: pulse-ready 2s infinite;
        }

        @keyframes pulse-ready {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 20px 10px rgba(46, 204, 113, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); transform: scale(1); }
        }
        
        /* New Item Highlight Animation */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .new-item { animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .table-badge {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .ready-col .table-badge {
            background: #2ecc71;
            color: #000;
        }

        .order-id-badge {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
            font-family: monospace;
        }

        /* Overlay Full Screen Prompt */
        .fullscreen-prompt {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>

    <link rel="stylesheet" href="logo.css">
    <!-- PWA Favicons -->
    <link rel="icon" type="image/png" href="/images/bunny_logo.png">
    <link rel="apple-touch-icon" href="/images/bunny_logo.png">
</head>
<body>

    <div id="setup-prompt" class="fullscreen-prompt" aria-label="TV Setup">
        <h2 style="color: var(--gold); font-size: 4rem; margin-bottom: 30px;"><i class="fa-solid fa-tv"></i> MÀN HÌNH TIVI</h2>
        <p style="font-size: 1.5rem; color: #aaa; margin-bottom: 40px;">Bấm nút bên dưới để cấp quyền phát âm thanh và mở toàn màn hình.</p>
        <button onclick="startTVMode()" class="btn btn-lg" style="background: var(--gold); color: #000; font-size: 2rem; font-weight: bold; padding: 20px 50px; border-radius: 20px;">BẮT ĐẦU <i class="fa-solid fa-play"></i></button>
    </div>

    <header class="tv-header">
        <div class="hub-logo mb-4" style="font-size: 3rem; justify-content: center; width: 100%;"><span class="text-1">Nohope</span><span class="text-2">Coffee</span></div>
        <div class="clock" id="tv-clock">00:00:00</div>
    </header>

    <div class="tv-grid">
        <!-- Đang Chuẩn Bị -->
        <div class="tv-column preparing-col">
            <div class="column-header">
                <i class="fa-solid fa-fire-burner me-2 text-warning"></i> ĐANG CHUẨN BỊ
            </div>
            <div class="orders-list" id="preparing-list">
                <!-- Items injected here -->
            </div>
        </div>

        <!-- Mời Nhận Đồ -->
        <div class="tv-column ready-col">
            <div class="column-header">
                <i class="fa-solid fa-bell-concierge me-2"></i> MỜI NHẬN ĐỒ
            </div>
            <div class="orders-list" id="ready-list">
                <!-- Items injected here -->
            </div>
        </div>
    </div>
    
    <!-- Audio element for Ding Dong -->
    <audio id="ding-dong-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="tv.js?v=1.1"></script>
</body>
</html>
