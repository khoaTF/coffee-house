<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Màn hình hiển thị trạng thái đơn hàng (TV Queue) cho quán Nohope Coffee.">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="TV Queue - Nohope Coffee">
    <meta property="og:description" content="Màn hình hiển thị trạng thái đơn hàng (TV Queue) cho quán Nohope Coffee.">
    
    <title>TV Queue - Nohope Coffee</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Compiled for Production) -->
    <link rel="stylesheet" href="css/tailwind-compiled.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js?v=1.1"></script>
    
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes pulseReady {
            0% { box-shadow: 0 0 0 0 rgba(76,175,80,0.6); }
            70% { box-shadow: 0 0 25px 20px rgba(76,175,80,0); }
            100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }
        }
        .animate-slideIn {
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .animate-pulseReady {
            animation: pulseReady 2s infinite;
        }
        /* Custom scrollbar for TV (subtle) */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3A3528; border-radius: 10px; }
        
        .ready-col-scrollbar::-webkit-scrollbar-thumb { background: rgba(76,175,80,0.3); border-radius: 10px; }

        /* Prevent burn-in by hiding cursor */
        body { cursor: none; }
    </style>

    <link rel="stylesheet" href="css/logo.css">
    <!-- PWA Favicons -->
    <link rel="icon" type="image/png" href="/images/bunny_logo.png">
    <link rel="apple-touch-icon" href="/images/bunny_logo.png">
</head>
<body class="bg-[#1A1814] text-[#E8DCC4] font-manrope h-screen flex flex-col overflow-hidden selection:bg-[#C0A062] selection:text-[#1A1814]">

    <div id="setup-prompt" class="fixed inset-0 bg-black/95 z-50 flex flex-col justify-center items-center" aria-label="TV Setup">
        <h2 class="text-[#D4AF37] text-5xl md:text-7xl font-noto font-black mb-8 drop-shadow-lg"><i class="fa-solid fa-tv me-4"></i> MÀN HÌNH TIVI</h2>
        <p class="text-xl md:text-2xl text-[#A89F88] mb-12">Bấm nút bên dưới để cấp quyền phát âm thanh và mở toàn màn hình.</p>
        <button onclick="startTVMode()" class="bg-gradient-to-r from-[#D4AF37] to-[#C0A062] text-[#1A1814] text-3xl font-black px-12 py-5 rounded-2xl shadow-[0_0_40px_rgba(212,175,55,0.4)] hover:scale-105 transition-transform" style="cursor: pointer;">
            BẮT ĐẦU <i class="fa-solid fa-play ms-2"></i>
        </button>
    </div>

    <!-- Header -->
    <header class="bg-[#232018]/90 backdrop-blur-md px-6 md:px-10 py-5 flex justify-between items-center border-b border-[#3A3528] shadow-soft z-10 sticky top-0">
        <div class="flex items-center gap-4">
            <img src="/images/bunny_logo.png" alt="Logo" class="w-14 h-14 md:w-16 md:h-16 rounded-2xl object-cover shadow-soft border border-[#3A3528]">
            <div>
                <h1 class="font-noto font-black text-3xl md:text-4xl text-[#F2E8D5] tracking-tight leading-none mb-1">Nohope</h1>
                <p class="text-[#D4AF37] uppercase tracking-[0.2em] font-bold text-xs md:text-sm mb-0">Coffee & Tea</p>
            </div>
        </div>
        <div class="font-mono text-3xl md:text-4xl font-black text-[#E8DCC4] bg-[#1A1814] px-6 py-3 rounded-2xl border border-[#3A3528] tracking-widest shadow-inner" id="tv-clock">
            00:00:00
        </div>
    </header>

    <!-- Main Grid -->
    <div class="flex-1 flex flex-col md:flex-row gap-6 md:gap-8 p-6 md:p-8 overflow-hidden">
        
        <!-- Đang Chuẩn Bị -->
        <div class="flex-1 bg-[#232018] rounded-[2rem] border border-[#3A3528] flex flex-col overflow-hidden shadow-soft relative">
            <div class="bg-[#3A3528]/50 p-5 md:p-6 text-center border-b border-[#3A3528]">
                <h2 class="font-noto text-3xl md:text-4xl font-black text-[#A89F88] tracking-widest uppercase mb-0"><i class="fa-solid fa-fire-burner text-[#D4AF37] me-3"></i>Đang Chuẩn Bị</h2>
            </div>
            <div class="flex-1 p-5 md:p-6 overflow-y-auto custom-scrollbar content-start flex flex-wrap gap-4 md:gap-6" id="preparing-list">
                <!-- Items injected here -->
            </div>
        </div>

        <!-- Mời Nhận Đồ -->
        <div class="flex-1 bg-gradient-to-b from-[#2d3a28] to-[#1A1814] rounded-[2rem] border border-[#4CAF50]/30 flex flex-col overflow-hidden shadow-[0_0_50px_rgba(76,175,80,0.1)] relative">
            <div class="bg-[#4CAF50]/20 p-5 md:p-6 text-center border-b border-[#4CAF50]/30 backdrop-blur-sm">
                <h2 class="font-noto text-3xl md:text-5xl font-black text-[#4CAF50] tracking-widest uppercase mb-0 drop-shadow-[0_2px_10px_rgba(76,175,80,0.4)]"><i class="fa-solid fa-bell-concierge me-3"></i>Mời Nhận Đồ</h2>
            </div>
            <div class="flex-1 p-5 md:p-6 overflow-y-auto ready-col-scrollbar content-start flex flex-wrap gap-4 md:gap-6" id="ready-list">
                <!-- Items injected here -->
            </div>
        </div>
        
    </div>
    
    <!-- Audio element for Ding Dong -->
    <audio id="ding-dong-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="js/tv.js?v=2.0"></script>
</body>
</html>
