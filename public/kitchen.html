<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nohope Coffee - Màn hình Bếp</title>
    <meta name="description" content="Màn hình quản lý bếp của Nohope Coffee.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://coffee-house.com/kitchen.html">
    <meta property="og:title" content="Nohope Coffee - Màn hình Bếp">
    <meta property="og:description" content="Màn hình quản lý bếp của Nohope Coffee.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        if (localStorage.getItem('cafe_role') !== 'kitchen' && localStorage.getItem('cafe_role') !== 'admin') {
            window.location.href = '/login.html';
        }
    </script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        body { padding: 0; margin: 0; background: #0d1117; color: #e6edf3; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .kitchen-header {
            background: linear-gradient(135deg, rgba(212,167,106,0.1) 0%, rgba(212,167,106,0.02) 100%);
            border: 1px solid rgba(212,167,106,0.15);
            border-radius: 16px;
            padding: 20px 28px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .kitchen-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f5f5f5;
        }
        .kitchen-header h1 i { color: #d4a76a; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header-actions .btn {
            font-size: 0.85rem;
            border-radius: 10px;
            padding: 8px 14px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.15);
            color: #c9d1d9;
            background: rgba(255,255,255,0.04);
            transition: all 0.2s;
        }
        .header-actions .btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.25);
            color: #fff;
        }
        .header-actions .btn-audio {
            border-color: rgba(212, 167, 106, 0.4);
            color: #d4a76a;
        }
        .header-actions .btn-audio:hover {
            background: rgba(212, 167, 106, 0.1);
        }

        #connection-status {
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        /* Toolbar */
        .kitchen-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 14px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
        }
        .kitchen-toolbar h5 {
            margin: 0;
            font-weight: 600;
            font-size: 1.05rem;
            color: #e6edf3;
        }
        .kitchen-toolbar h5 i { color: #d4a76a; margin-right: 8px; }

        .form-check-input:checked {
            background-color: #d4a76a;
            border-color: #d4a76a;
        }
        .form-check-label { color: #c9d1d9; }

        /* Empty State */
        .empty-kitchen {
            text-align: center;
            padding: 80px 20px;
            color: #8b949e;
        }
        .empty-kitchen i {
            font-size: 3.5rem;
            margin-bottom: 16px;
            color: rgba(212, 167, 106, 0.3);
            display: block;
        }
        .empty-kitchen p {
            font-size: 1.1rem;
            margin: 0;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        /* Override modal for dark theme */
        .modal-content {
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.1);
            color: #e6edf3;
        }
        .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .modal-title { color: #d4a76a; }
        .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }
        .list-group-item {
            background: transparent;
            border-color: rgba(255,255,255,0.06);
            color: #e6edf3;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="kitchen-header">
            <h1><i class="fa-solid fa-fire-burner"></i> Quản lý Bếp</h1>
            <div class="header-actions">
                <button id="btn-toggle-audio" class="btn btn-audio" onclick="toggleAudio()"><i class="fa-solid fa-volume-high"></i> Âm báo</button>
                <button class="btn" onclick="openKitchenHistory()"><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử</button>
                <a href="/admin.html" class="btn" style="text-decoration: none;"><i class="fa-solid fa-gear"></i> Quản trị</a>
                <button class="btn" onclick="localStorage.clear(); window.location.href='/login.html'"><i class="fa-solid fa-sign-out-alt"></i> Đăng xuất</button>
                <div id="connection-status"><i class="fa-solid fa-wifi"></i> Trực tuyến</div>
            </div>
        </div>

        <div id="alerts-container"></div>

        <div id="loader" class="text-center mt-4 text-muted" style="display:none;">Đang tải đơn hàng...</div>

        <!-- Kitchen Toolbar -->
        <div class="kitchen-toolbar">
            <h5><i class="fa-solid fa-bell-concierge"></i> Đơn hàng đang chờ</h5>
            <div class="form-check form-switch fs-5">
                <input class="form-check-input" type="checkbox" role="switch" id="groupOrdersToggle" onchange="toggleOrderGrouping()">
                <label class="form-check-label" for="groupOrdersToggle">Gộp Món</label>
            </div>
        </div>

        <div style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
            <!-- Orders Grid -->
            <div class="dashboard-grid" id="orders-container" style="flex: 1; min-width: 60%;">
                <!-- Order cards will be injected here via JS -->
            </div>
            
            <!-- Sidebar Batch Tracker -->
            <div class="batch-sidebar" id="batch-container" style="width: 320px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 18px; position: sticky; top: 20px;">
                <h6 style="color: #d4a76a; font-weight: bold; margin-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px; font-size: 1.1rem;"><i class="fa-solid fa-layer-group"></i> Tổng hợp chế biến</h6>
                <div id="batch-list">
                    <!-- Batch items will go here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Kitchen History Modal -->
    <div class="modal fade" id="kitchenHistoryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title font-bold"><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử Đơn hàng (Bếp)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0" style="max-height: 400px; overflow-y: auto;">
                    <div id="kitchen-history-loader" class="text-center py-4" style="display: none;">
                        <i class="fa-solid fa-spinner fa-spin text-primary fs-3"></i>
                        <div class="mt-2 text-muted">Đang tải dữ liệu...</div>
                    </div>
                    <div id="kitchen-history-error" class="text-center py-4 text-danger" style="display: none;">
                        <i class="fa-solid fa-triangle-exclamation fs-3"></i>
                        <div class="mt-2">Không thể tải lịch sử đơn hàng.</div>
                    </div>
                    <div class="list-group list-group-flush" id="kitchen-history-list">
                        <!-- History items injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="kitchen.js"></script>
</body>
</html>
