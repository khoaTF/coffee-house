<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nohope Coffee - Màn hình Bếp</title>
    <meta name="description" content="Màn hình quản lý bếp của Nohope Coffee.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://coffee-house.com/kitchen.html">
    <meta property="og:title" content="Nohope Coffee - Màn hình Bếp">
    <meta property="og:description" content="Màn hình quản lý bếp của Nohope Coffee.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script>
        const role = localStorage.getItem('cafe_role') || sessionStorage.getItem('cafe_role');
        const token = localStorage.getItem('cafe_token') || sessionStorage.getItem('cafe_token');
        if (role !== 'kitchen' && role !== 'admin') {
            window.location.href = '/login.html';
        } else if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 < Date.now()) {
                    localStorage.clear(); sessionStorage.clear();
                    window.location.href = '/login.html';
                }
            } catch(e) {}
        }
    </script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <link rel="stylesheet" href="css/kitchen.css">
    <!-- PWA Favicons -->
    <link rel="icon" type="image/png" href="/images/bunny_logo.png">
    <link rel="apple-touch-icon" href="/images/bunny_logo.png">
</head>
<body>

    <div class="dashboard-container">
        <div class="kitchen-header">
            <h1><i class="fa-solid fa-fire-burner"></i> Quản lý Bếp</h1>
            <div class="header-actions">
                <button id="btn-toggle-audio" class="btn btn-audio" onclick="toggleAudio()"><i class="fa-solid fa-volume-high"></i> Âm báo</button>
                <button class="btn" onclick="openKitchenHistory()"><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử</button>
                <a href="/admin.html" class="btn" style="text-decoration: none;" id="btn-admin-link" onclick="if (role !== 'admin' && role !== 'manager') { event.preventDefault(); alert('Chỉ có Quản lý mới được vào trang Quản trị!'); } else { window.location.href='/admin.html'; }"><i class="fa-solid fa-gear"></i> Quản trị</a>
                <button class="btn" onclick="localStorage.clear(); sessionStorage.clear(); window.location.href='/login.html'"><i class="fa-solid fa-sign-out-alt"></i> Đăng xuất</button>
                <div id="connection-status"><i class="fa-solid fa-wifi"></i> Trực tuyến</div>
            </div>
        </div>

        <div id="alerts-container"></div>

        <div id="loader" class="text-center mt-4 text-muted" style="display:none;">Đang tải đơn hàng...</div>

        <!-- Kitchen Toolbar -->
        <div class="kitchen-toolbar flex-wrap gap-3">
            <h5 class="mb-0"><i class="fa-solid fa-bell-concierge"></i> Đơn hàng đang chờ</h5>
            <div class="d-flex gap-4">
                <div class="form-check form-switch fs-6 d-flex align-items-center gap-2">
                    <input class="form-check-input ms-0 mt-0" type="checkbox" role="switch" id="autoPrintToggle" onchange="toggleAutoPrint()">
                    <label class="form-check-label mb-0 mt-1" for="autoPrintToggle"><i class="fa-solid fa-print text-primary"></i> Tự in đơn mới</label>
                </div>
                <div class="form-check form-switch fs-6 d-flex align-items-center gap-2">
                    <input class="form-check-input ms-0 mt-0" type="checkbox" role="switch" id="groupOrdersToggle" onchange="toggleOrderGrouping()">
                    <label class="form-check-label mb-0 mt-1" for="groupOrdersToggle"><i class="fa-solid fa-layer-group text-info"></i> Gộp Món</label>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
            <!-- Orders Grid -->
            <div class="dashboard-grid" id="orders-container" style="flex: 1; min-width: 60%;">
                <!-- Order cards will be injected here via JS -->
            </div>
            
            <!-- Sidebar Batch Tracker -->
            <div class="batch-sidebar" id="batch-container" style="width: 320px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 18px; position: sticky; top: 20px;">
                <h6 style="color: #d4a76a; font-weight: bold; margin-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px; font-size: 1.1rem;"><i class="fa-solid fa-layer-group"></i> Tổng hợp chế biến</h6>
                <div id="batch-list">
                    <!-- Batch items will go here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Kitchen History Modal -->
    <div class="modal fade" id="kitchenHistoryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title font-bold"><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử Đơn hàng (Bếp)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0" style="max-height: 400px; overflow-y: auto;">
                    <div id="kitchen-history-loader" class="text-center py-4" style="display: none;">
                        <i class="fa-solid fa-spinner fa-spin text-primary fs-3"></i>
                        <div class="mt-2 text-muted">Đang tải dữ liệu...</div>
                    </div>
                    <div id="kitchen-history-error" class="text-center py-4 text-danger" style="display: none;">
                        <i class="fa-solid fa-triangle-exclamation fs-3"></i>
                        <div class="mt-2">Không thể tải lịch sử đơn hàng.</div>
                    </div>
                    <div class="list-group list-group-flush" id="kitchen-history-list">
                        <!-- History items injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/kitchen.js"></script>
</body>
</html>
