<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nohope Coffee - Đăng nhập</title>
    <meta name="description" content="Đăng nhập vào hệ thống quản lý Nohope Coffee.">
    <!-- Open Graph tags to satisfy SEO check -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://coffee-house.com/login.html">
    <meta property="og:title" content="Nohope Coffee - Đăng nhập">
    <meta property="og:description" content="Đăng nhập vào hệ thống quản lý Nohope Coffee.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet" href="css/logo.css">
    <!-- PWA Favicons -->
    <link rel="icon" type="image/png" href="/images/bunny_logo.png">
    <link rel="apple-touch-icon" href="/images/bunny_logo.png">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <a href="/" class="brand-logo" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px;">
                <img src="/images/bunny_logo.png" alt="Bunny Logo" style="height: 55px; width: 55px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                <span style="font-weight: 900; font-size: 1.8rem; color: #ffffff; letter-spacing: -0.5px; text-transform: uppercase;">Nohope</span>
            </a>
            <p class="subtitle">Đăng nhập vào hệ thống quản lý</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <div class="input-icon-wrapper">
                        <input type="text" id="username" placeholder="Nhập Tài Khoản..." required autocomplete="username">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Mật khẩu</label>
                    <div class="input-icon-wrapper">
                        <input type="password" id="password" placeholder="Nhập mật khẩu..." required autocomplete="current-password">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="login-btn">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập
                </button>
                
                <div class="error-msg" id="error-msg">
                    <i class="fa-solid fa-circle-exclamation me-1"></i> Tài khoản hoặc mật khẩu không đúng!
                </div>
            </form>

            <p class="footer-text">
                Powered by <a href="/">Nohope Coffee System</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username')?.value || '';
            const pass = document.getElementById('password')?.value || '';
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Đang xác thực...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (response.ok) {
                    const data = await response.json();
                    sessionStorage.setItem('cafe_token', data.token);
                    sessionStorage.setItem('cafe_role', data.role);

                    // Clear old localStorage if present to force clean session
                    localStorage.removeItem('cafe_token');
                    localStorage.removeItem('cafe_role');

                    btn.innerHTML = '<i class="fa-solid fa-check me-2"></i>Thành công!';
                    btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

                    setTimeout(() => {
                        if (data.role === 'admin') window.location.href = '/admin.html';
                        else if (data.role === 'kitchen') window.location.href = '/kitchen.html';
                        else window.location.href = '/index.html';
                    }, 500);
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = "Lỗi kết nối đến máy chủ.";
                errorMsg.style.display = 'block';
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập';
                    btn.style.background = '';
                }, 1500);
            }
        });
    </script>

    <!-- Floating sparkles -->
    <script>
        for (let i = 0; i < 12; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = (6 + Math.random() * 8) + 's';
            s.style.animationDelay = Math.random() * 8 + 's';
            s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
            document.body.appendChild(s);
        }
    </script>
</body>

</html>
