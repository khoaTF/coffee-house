<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nohope Coffee - Đăng nhập</title>
    <meta name="description" content="Đăng nhập vào hệ thống quản lý Nohope Coffee.">
    <!-- Open Graph tags to satisfy SEO check -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://coffee-house.com/login.html">
    <meta property="og:title" content="Nohope Coffee - Đăng nhập">
    <meta property="og:description" content="Đăng nhập vào hệ thống quản lý Nohope Coffee.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet" href="css/logo.css">
    <!-- PWA Favicons -->
    <link rel="icon" type="image/png" href="/images/bunny_logo.png">
    <link rel="apple-touch-icon" href="/images/bunny_logo.png">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <a href="/" class="brand-logo" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px;">
                <img src="/images/bunny_logo.png" alt="Bunny Logo" style="height: 55px; width: 55px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                <span style="font-weight: 900; font-size: 1.8rem; color: #ffffff; letter-spacing: -0.5px; text-transform: uppercase;">Nohope</span>
            </a>
            <p class="subtitle">Đăng nhập vào hệ thống quản lý</p>

            <div class="login-tabs">
                <button type="button" class="login-tab active" id="tab-account"><i class="fa-solid fa-user-lock me-2"></i>Tài khoản</button>
                <button type="button" class="login-tab" id="tab-pin"><i class="fa-solid fa-key me-2"></i>Mã PIN</button>
            </div>

            <form id="login-form">
                <!-- Account Section -->
                <div id="account-section">
                    <div class="form-group">
                        <label>Tên đăng nhập</label>
                        <div class="input-icon-wrapper">
                            <input type="text" id="username" placeholder="Nhập Tài Khoản..." autocomplete="username">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <div class="input-icon-wrapper">
                            <input type="password" id="password" placeholder="Nhập mật khẩu..." autocomplete="current-password">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>
                </div>

                <!-- PIN Section -->
                <div id="pin-section" style="display: none;">
                    <div class="form-group">
                        <label style="text-align: center; display: block; width: 100%;">Mã PIN Bí mật</label>
                        <div class="input-icon-wrapper">
                            <input type="password" id="staff-pin" placeholder="••••••" inputmode="numeric" autocomplete="off" style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5em; font-weight: bold;">
                            <i class="fa-solid fa-key" style="left: 20px;"></i>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="login-btn">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập
                </button>
                
                <div class="error-msg" id="error-msg">
                    <i class="fa-solid fa-circle-exclamation me-1"></i> <span id="error-text">Tài khoản hoặc mật khẩu không đúng!</span>
                </div>
            </form>

            <p class="footer-text">
                Powered by <a href="/">Nohope Coffee System</a>
            </p>
        </div>
    </div>

    <!-- Supabase Core & Auth logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        let currentMode = 'account';

        // Tab Switching
        document.getElementById('tab-account').addEventListener('click', () => {
            currentMode = 'account';
            document.getElementById('tab-account').classList.add('active');
            document.getElementById('tab-pin').classList.remove('active');
            document.getElementById('account-section').style.display = 'block';
            document.getElementById('pin-section').style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';
        });

        document.getElementById('tab-pin').addEventListener('click', () => {
            currentMode = 'pin';
            document.getElementById('tab-pin').classList.add('active');
            document.getElementById('tab-account').classList.remove('active');
            document.getElementById('pin-section').style.display = 'block';
            document.getElementById('account-section').style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('staff-pin').focus();
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Đang xác thực...';
            errorMsg.style.display = 'none';

            try {
                if (currentMode === 'account') {
                    const user = document.getElementById('username')?.value || '';
                    const pass = document.getElementById('password')?.value || '';
                    if (!user || !pass) throw new Error("Vui lòng nhập đủ Tên đăng nhập và Mật khẩu.");

                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user, password: pass })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        sessionStorage.setItem('cafe_token', data.token);
                        sessionStorage.setItem('cafe_role', data.role);
                        localStorage.removeItem('cafe_token');
                        localStorage.removeItem('cafe_role');

                        btn.innerHTML = '<i class="fa-solid fa-check me-2"></i>Thành công!';
                        btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

                        setTimeout(() => {
                            if (data.role === 'admin') window.location.href = '/admin.html';
                            else if (data.role === 'kitchen') window.location.href = '/kitchen.html';
                            else window.location.href = '/index.html';
                        }, 500);
                    } else {
                        throw new Error("Tài khoản hoặc mật khẩu không đúng!");
                    }
                } else {
                    // PIN Mode via Supabase
                    const pin = document.getElementById('staff-pin')?.value || '';
                    if (!pin) throw new Error("Vui lòng nhập Mã PIN.");

                    const { data, error } = await supabase
                        .rpc('verify_pin', { pin_code: pin })
                        .single();

                    if (error || !data) throw new Error("Mã PIN không hợp lệ (sai mã)!");

                    sessionStorage.setItem('cafe_role', data.role);
                    sessionStorage.setItem('nohope_staff_auth', 'true');
                    sessionStorage.setItem('nohope_staff_name', data.name || 'Nhân viên');
                    
                    localStorage.removeItem('cafe_role');
                    localStorage.removeItem('nohope_staff_auth');
                    localStorage.removeItem('nohope_staff_name');

                    btn.innerHTML = '<i class="fa-solid fa-check me-2"></i>Thành công!';
                    btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

                    setTimeout(() => {
                        if (data.role === 'kitchen') window.location.href = '/kitchen.html';
                        else if (data.role === 'admin' || data.role === 'manager') window.location.href = '/admin.html';
                        else window.location.href = '/staff.html';
                    }, 500);
                }
            } catch (err) {
                errorText.innerText = err.message || "Lỗi kết nối đến máy chủ.";
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập';
                    btn.style.background = '';
                }, 1500);
            }
        });
    </script>

    <!-- Floating sparkles -->
    <script>
        for (let i = 0; i < 12; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = (6 + Math.random() * 8) + 's';
            s.style.animationDelay = Math.random() * 8 + 's';
            s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
            document.body.appendChild(s);
        }
    </script>
</body>

</html>
