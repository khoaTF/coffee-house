version: '3.8'

services:
  app:
    build: .
    container_name: nohope_cafe_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      - cafe_network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: nohope_cafe_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - cafe_network

  nginx:
    image: nginx:alpine
    container_name: nohope_cafe_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - cafe_network
    depends_on:
      - app

networks:
  cafe_network:
    driver: bridge

volumes:
  redis_data:
